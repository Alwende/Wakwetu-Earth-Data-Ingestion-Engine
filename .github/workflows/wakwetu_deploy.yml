name: Wakwetu Earth-Data Engine CI/CD

on:
  push:
    branches: [ main ]

# This block grants the automated runner permission to write to the repo
permissions:
  contents: write

jobs:
  deploy_to_web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy Static Site to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: .
          branch: gh-pages
